name: Update package.json

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. 21.1.8-1) — without leading v'
        required: true
        type: string
      sha256:
        description: 'SHA-256 of the release tarball'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-package-json:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Patch package.json
        run: |
          RELEASE_VERSION="${{ inputs.release_version }}"
          XPACK_VERSION="${RELEASE_VERSION}.1"
          SHA256="${{ inputs.sha256 }}"
          FILENAME="rv32-llvm-picolibc-${RELEASE_VERSION}.tar.gz"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${RELEASE_VERSION}"

          jq \
            --arg v  "${XPACK_VERSION}" \
            --arg sha "${SHA256}" \
            --arg fn  "${FILENAME}" \
            --arg url "${BASE_URL}" \
            '
              .version = $v |
              .xpack.binaries.baseUrl = $url |
              .xpack.binaries.platforms["darwin-arm64"].fileName = $fn |
              .xpack.binaries.platforms["darwin-arm64"].sha256   = $sha |
              .xpack.binaries.platforms["darwin-x64"].fileName   = $fn |
              .xpack.binaries.platforms["darwin-x64"].sha256     = $sha |
              .xpack.binaries.platforms["linux-arm64"].fileName  = $fn |
              .xpack.binaries.platforms["linux-arm64"].sha256    = $sha |
              .xpack.binaries.platforms["linux-x64"].fileName    = $fn |
              .xpack.binaries.platforms["linux-x64"].sha256      = $sha
            ' \
            package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add package.json
          git diff --cached --quiet \
            || git commit -m "chore: update package.json for v${{ inputs.release_version }} [skip ci]"
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
